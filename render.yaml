# Render Blueprint for CMS Manager
# https://render.com/docs/blueprint-spec
#
# Two services:
#   1. cms-manager-server - Express API (Node web service)
#   2. cms-manager-client - Vite static site
#
# All secret/deployment-specific values use `sync: false`, meaning Render
# will prompt for them in the dashboard rather than storing them in this
# file / git history. See docs/deployment.md for the full deploy sequence —
# CLIENT_ORIGIN, VITE_API_BASE_URL, and the Webflow OAuth redirect URI all
# have a chicken-and-egg dependency on URLs Render only assigns after the
# first deploy.

services:
  - type: web
    name: cms-manager-server
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    # --include=dev is required: NODE_ENV=production (set below) makes plain
    # `npm install` skip devDependencies entirely, which includes TypeScript
    # itself and every @types/* package the build needs.
    buildCommand: npm install --include=dev && npm run build:server
    startCommand: npm run start -w server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      # Not auto-generated by Render — it must be exactly 64 hex characters
      # (32 bytes), which Render's own `generateValue` doesn't guarantee.
      - key: ENCRYPTION_KEY
        sync: false
      # Optional — API Token connection works without these (Section 4.3).
      # Leave blank until a Webflow OAuth app is registered.
      - key: WEBFLOW_OAUTH_CLIENT_ID
        sync: false
      - key: WEBFLOW_OAUTH_CLIENT_SECRET
        sync: false
      - key: WEBFLOW_OAUTH_REDIRECT_URI
        sync: false

  - type: web
    name: cms-manager-client
    runtime: static
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
